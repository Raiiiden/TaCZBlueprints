# This is an example mods.toml file. It contains the data relating to the loading mods.
modLoader="javafml" #mandatory
license="ARR"

# A version range to match for said mod loader - for regular FML @Mod it will be the forge version
loaderVersion="[6,)" #mandatory

# A URL to refer people to when problems occur with this mod
issueTrackerURL=""

[[mods]] #mandatory
modId="taczblueprints" #mandatory
version="0.1.0" #mandatory
displayName="TaCZ: Blueprints" #mandatory
updateJSONURL=""
displayURL="https://www.curseforge.com/minecraft/mc-mods/_curseslug_"
logoFile=""
credits=""
authors="Raiiiden"
description='''Blueprint/research system for TaCZ'''

[[dependencies.taczblueprints]]
modId="forge"
mandatory=true
versionRange="[6,)"
ordering="NONE"
side="BOTH"

[[dependencies.taczblueprints]]
modId="minecraft"
mandatory=true
versionRange="[1.20,)"
ordering="NONE"
side="BOTH"
